<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PWA系統</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23667eea'/%3E%3Cstop offset='100%25' stop-color='%23764ba2'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='25' fill='url(%23g)'/%3E%3Ctext x='50%25' y='55%25' font-family='sans-serif' font-size='60' text-anchor='middle' dominant-baseline='central'%3E🛠️%3C/text%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='25' fill='%23667eea'/%3E%3Ctext x='50%25' y='55%25' font-family='sans-serif' font-size='60' text-anchor='middle' dominant-baseline='central'%3E🛠️%3C/text%3E%3C/svg%3E">

    <style>
        /* 2. 界面美化 CSS - 專業系統風格 */
        :root { --primary: #764ba2; --bg: #f4f7f9; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 入口導覽畫面 */
        .portal-home { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 30px; }
        .pwa-logo { width: 100px; height: 100px; margin-bottom: 20px; filter: drop-shadow(0 4px 6px rgba(118, 75, 162, 0.2)); }
        h1 { font-size: 1.6rem; color: #333; margin: 0 0 40px; }
        .menu-grid { width: 100%; max-width: 400px; display: grid; gap: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; text-decoration: none; color: #444; box-shadow: 0 8px 16px rgba(0,0,0,0.05); transition: 0.2s; display: flex; flex-direction: column; align-items: center; font-size: 1.1rem; font-weight: 600; cursor: pointer; border: 2px solid transparent; }
        .card:active { transform: scale(0.96); border-color: var(--primary); background-color: #fcf9ff; }
        .icon { font-size: 45px; display: block; margin-bottom: 12px; }

        /* 3. iframe 內嵌視窗 CSS - 解決全螢幕與醜網址的問題 */
        #app-viewer { display: none; flex: 1; flex-direction: column; width: 100%; height: 100%; position: fixed; top: 0; left: 0; background: white; z-index: 1000; padding-top: env(safe-area-inset-top); /* 支援 iPhone 瀏海屏 Safe Area */ }
        
        /* 回主選單按鈕 */
        #back-bar { background: var(--primary); color: white; padding: 12px 15px; display: flex; justify-content: start; cursor: pointer; font-size: 0.9rem; font-weight: bold; }
        #app-iframe { border: none; width: 100%; height: 100%; flex: 1; }
    </style>
</head>
<body>

    <div id="portal-home" class="portal-home">
        <svg class="pwa-logo" viewBox="0 0 100 100">
            <defs><linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#667eea"/><stop offset="100%" stop-color="#764ba2"/></linearGradient></defs>
            <rect width="100" height="100" rx="25" fill="url(#g2)"/><text x="50%" y="55%" font-family="sans-serif" font-size="60" text-anchor="middle" dominant-baseline="central">🛠️</text>
        </svg>
        <h1>PWA系統</h1>
        
        <div class="menu-grid">
            <div class="card" onclick="openApp('/hr-app/')"><span class="icon">📅</span>HR 出勤系統</div>
            <div class="card" onclick="openApp('/my-money-app/')"><span class="icon">💰</span>個人記帳本</div>
        </div>
    </div>

    <div id="app-viewer">
        <div id="back-bar" onclick="closeApp()">🏠 返回PWA系統</div>
        <iframe id="app-iframe" src="" allow="local-storage" referrerpolicy="origin"></iframe>
    </div>

    <script>
        // 4. 控制核心：使用 iframe 進行全螢幕呈現，並去除網址列
        const GITHUB_OWNER = 'krisxdoohan-hub'; // 已經填入你的帳號
        const PORTAL_HOME = document.getElementById('portal-home');
        const APP_VIEWER = document.getElementById('app-viewer');
        const APP_IFRAME = document.getElementById('app-iframe');

        function openApp(appPath) {
            // 拼接完整網址 (確保跨裝置存取)
            const appUrl = `https://${GITHUB_OWNER}.github.io${appPath}`;
            
            // 載入 App 到 iframe
            APP_IFRAME.src = appUrl;
            
            // 切換視覺呈現：隱藏門面，顯示全螢幕 App
            PORTAL_HOME.style.display = 'none';
            APP_VIEWER.style.display = 'flex';
        }

        function closeApp() {
            // 切換視覺呈現：返回門面，清除 iframe 內容
            APP_VIEWER.style.display = 'none';
            PORTAL_HOME.style.display = 'flex';
            APP_IFRAME.src = ''; 
        }

        // PWA 註冊邏輯 (維持不變)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/my-portal/sw.js').then(() => console.log("門面系統服務正常啟動"));
        }
    </script>
</body>
</html>
